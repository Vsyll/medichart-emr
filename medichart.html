<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediChart — Sistem Catatan Pemeriksaan Dokter</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,600;1,500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DESIGN TOKENS
============================================================ */
:root {
  /* Colors */
  --ink:        #111827;
  --ink-mid:    #374151;
  --ink-soft:   #6B7280;
  --ink-ghost:  #9CA3AF;
  --bg:         #F3F6FA;
  --surface:    #FFFFFF;
  --surface2:   #F9FAFB;
  --border:     #E5E9F0;
  --border-dk:  #D1D9E6;

  --primary:    #1D6FA4;      /* steel blue */
  --primary-lt: #EBF4FB;
  --primary-dk: #155A87;
  --green:      #0F9D7E;
  --green-lt:   #E6F6F2;
  --green-dk:   #0B7D65;
  --amber:      #D97706;
  --amber-lt:   #FEF3C7;
  --red:        #DC2626;
  --red-lt:     #FEE2E2;

  /* Sidebar */
  --sb:         #0C1F35;
  --sb-lt:      #142840;
  --sb-border:  rgba(255,255,255,.07);
  --sb-text:    rgba(255,255,255,.55);
  --sb-active:  rgba(255,255,255,.10);

  /* Misc */
  --r:    10px;
  --rsm:  6px;
  --rxs:  4px;
  --shadow-sm: 0 1px 4px rgba(17,24,39,.06);
  --shadow:    0 3px 12px rgba(17,24,39,.10);
  --shadow-md: 0 8px 32px rgba(17,24,39,.14);

  --font:   'Plus Jakarta Sans', system-ui, sans-serif;
  --serif:  'Playfair Display', Georgia, serif;
  --t: .15s ease;
}

/* ============================================================
   RESET
============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: var(--font); background: var(--bg); color: var(--ink); font-size: 14px; line-height: 1.6; min-height: 100vh; }
input, textarea, select, button { font-family: inherit; font-size: inherit; }
a { text-decoration: none; color: inherit; }

/* ============================================================
   UTILITY
============================================================ */
.hidden { display: none !important; }
.w-full { width: 100%; }
.flex   { display: flex; }
.items-center { align-items: center; }
.gap-8  { gap: 8px; }
.flex-1 { flex: 1; }
.text-sm   { font-size: 13px; }
.text-xs   { font-size: 11px; }
.text-muted { color: var(--ink-soft); }
.bold { font-weight: 600; }
.serif { font-family: var(--serif); }
.divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }

/* ============================================================
   ANIMATIONS
============================================================ */
@keyframes fadeUp  { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }
@keyframes slideIn { from { opacity:0; transform:translateX(-8px); } to { opacity:1; transform:translateX(0); } }
.anim-up    { animation: fadeUp  .28s ease both; }
.anim-in    { animation: fadeIn  .22s ease both; }
.anim-slide { animation: slideIn .22s ease both; }

/* ============================================================
   TOAST
============================================================ */
#toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  padding: 12px 18px; border-radius: var(--rsm);
  font-size: 13px; font-weight: 500;
  box-shadow: var(--shadow-md); max-width: 320px;
  transition: opacity .3s, transform .3s;
  opacity: 0; transform: translateY(8px); pointer-events: none;
}
#toast.show   { opacity: 1; transform: translateY(0); pointer-events: auto; }
#toast.t-ok   { background: var(--green);   color: #fff; }
#toast.t-err  { background: var(--red);     color: #fff; }
#toast.t-info { background: var(--primary); color: #fff; }

/* ============================================================
   MODAL
============================================================ */
.modal-bg {
  position: fixed; inset: 0; z-index: 600;
  background: rgba(12,31,53,.5);
  display: flex; align-items: flex-start; justify-content: center;
  padding: 32px 16px; overflow-y: auto;
  animation: fadeIn .2s ease;
}
.modal {
  background: var(--surface); border-radius: var(--r);
  box-shadow: var(--shadow-md);
  width: 100%; max-width: 640px;
  animation: fadeUp .25s ease;
  flex-shrink: 0;
}
.modal-head {
  padding: 18px 22px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-family: var(--serif); font-size: 17px; }
.modal-body  { padding: 20px 22px 24px; }
.btn-close {
  width: 30px; height: 30px; border: none; cursor: pointer;
  background: var(--surface2); border-radius: var(--rxs);
  color: var(--ink-soft); font-size: 18px; line-height: 1;
  display: grid; place-items: center;
  transition: background var(--t), color var(--t);
}
.btn-close:hover { background: var(--red-lt); color: var(--red); }

/* ============================================================
   FORM ELEMENTS
============================================================ */
.field { margin-bottom: 14px; }
.field > label {
  display: block; font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .5px;
  color: var(--ink-mid); margin-bottom: 5px;
}
.req { color: var(--red); margin-left: 2px; }
.field input, .field textarea, .field select {
  width: 100%; padding: 9px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--rsm); background: var(--surface2);
  color: var(--ink); outline: none;
  transition: border-color var(--t), box-shadow var(--t), background var(--t);
}
.field input:focus, .field textarea:focus, .field select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(29,111,164,.12);
  background: var(--surface);
}
.field textarea { min-height: 72px; resize: vertical; }
.field.f-err input, .field.f-err textarea, .field.f-err select { border-color: var(--red); }
.f-msg { font-size: 11px; color: var(--red); margin-top: 4px; min-height: 15px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid-2.grid-3col { grid-template-columns: 1fr 1fr 1fr; }

/* Validation summary block */
.val-box {
  background: var(--red-lt); border: 1px solid #FECACA;
  border-radius: var(--rsm); padding: 10px 14px;
  font-size: 13px; color: var(--red);
  margin-bottom: 12px; display: none;
}
.val-box ul { margin-left: 16px; margin-top: 3px; }

/* Section label inside form */
.form-section-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .5px; color: var(--ink-ghost);
  padding: 4px 0 10px; margin-top: 6px;
  display: flex; align-items: center; gap: 8px;
}
.form-section-label::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* ============================================================
   BUTTONS
============================================================ */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border: none; border-radius: var(--rsm);
  font-family: var(--font); font-size: 13px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  transition: background var(--t), box-shadow var(--t), transform var(--t);
}
.btn:active { transform: translateY(1px); }
.btn-primary { background: var(--primary);  color: #fff; }
.btn-primary:hover   { background: var(--primary-dk); box-shadow: 0 4px 14px rgba(29,111,164,.28); }
.btn-green   { background: var(--green);    color: #fff; }
.btn-green:hover     { background: var(--green-dk); box-shadow: 0 4px 14px rgba(15,157,126,.28); }
.btn-ghost   { background: var(--surface2); color: var(--ink-mid); border: 1.5px solid var(--border); }
.btn-ghost:hover     { background: var(--border); }
.btn-amber   { background: var(--amber);    color: #fff; }
.btn-amber:hover     { background: #B45309; }
.btn-red     { background: var(--red);      color: #fff; }
.btn-red:hover       { background: #B91C1C; }
.btn-sm  { padding: 6px 12px; font-size: 12px; }
.btn-xs  { padding: 4px 9px;  font-size: 11px; }
.btn-icon { padding: 7px; }

/* ============================================================
   BADGE / TAG
============================================================ */
.badge {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 8px; border-radius: 20px;
  font-size: 11px; font-weight: 700; letter-spacing: .2px;
}
.b-blue   { background: var(--primary-lt); color: var(--primary-dk); }
.b-green  { background: var(--green-lt);   color: var(--green-dk); }
.b-amber  { background: var(--amber-lt);   color: #92400E; }
.b-gray   { background: #EEF2F7;           color: var(--ink-mid); }
.b-red    { background: var(--red-lt);     color: var(--red); }

/* SOAP colored pill */
.soap-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 4px;
  font-size: 11px; font-weight: 700;
}
.sp-s { background: #EFF6FF; color: #1D4ED8; }
.sp-o { background: var(--amber-lt); color: #92400E; }
.sp-a { background: var(--red-lt); color: var(--red); }
.sp-p { background: var(--green-lt); color: var(--green-dk); }

/* ============================================================
   CARD
============================================================ */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); box-shadow: var(--shadow-sm); overflow: hidden;
}
.card-head {
  padding: 13px 18px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.card-title {
  font-family: var(--serif); font-size: 15px; font-weight: 600;
  display: flex; align-items: center; gap: 8px;
}
.card-icon {
  width: 26px; height: 26px; border-radius: 6px;
  background: var(--primary-lt); color: var(--primary);
  display: grid; place-items: center; flex-shrink: 0;
}
.card-icon svg { width: 13px; height: 13px; }
.card-icon.green { background: var(--green-lt);  color: var(--green); }
.card-icon.amber { background: var(--amber-lt);  color: var(--amber); }
.card-icon.gray  { background: #EEF2F7; color: var(--ink-mid); }
.card-body { padding: 16px 18px; }

/* ============================================================
   LOGIN PAGE
============================================================ */
#page-login {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 24px;
  background: linear-gradient(145deg, var(--sb) 0%, #0E2E4D 50%, #0C3355 100%);
  position: relative; overflow: hidden;
}
#page-login::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse at 80% 10%, rgba(29,111,164,.25) 0%, transparent 55%),
    radial-gradient(ellipse at 10% 90%, rgba(15,157,126,.15) 0%, transparent 50%);
}
/* Grid decoration */
#page-login::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
  background-size: 40px 40px;
}
.login-card {
  background: rgba(255,255,255,.97); border-radius: 14px;
  box-shadow: 0 24px 64px rgba(0,0,0,.30);
  width: 100%; max-width: 400px;
  padding: 40px 36px; position: relative; z-index: 1;
  animation: fadeUp .4s ease;
}
.login-brand {
  display: flex; align-items: center; gap: 10px; margin-bottom: 28px;
}
.brand-icon {
  width: 38px; height: 38px; border-radius: 9px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dk));
  display: grid; place-items: center; flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(29,111,164,.35);
}
.brand-icon svg { color: #fff; width: 18px; height: 18px; }
.brand-name { font-family: var(--serif); font-size: 21px; color: var(--sb); }
.brand-name span { color: var(--primary); font-style: italic; }
.login-h { font-family: var(--serif); font-size: 24px; margin-bottom: 3px; color: var(--ink); }
.login-sub { color: var(--ink-soft); font-size: 13px; margin-bottom: 24px; }
#l-err {
  background: var(--red-lt); border: 1px solid #FECACA; color: var(--red);
  border-radius: var(--rsm); padding: 9px 12px; font-size: 13px;
  margin-top: 10px; display: none;
}
.login-hint {
  margin-top: 14px; padding: 9px 12px;
  background: var(--amber-lt); border: 1px solid #FDE68A;
  border-radius: var(--rsm); font-size: 12px; color: #78350F; line-height: 1.6;
}
.login-hint code {
  background: rgba(0,0,0,.06); padding: 1px 5px; border-radius: 3px; font-family: monospace;
}

/* ============================================================
   APP SHELL
============================================================ */
#page-app { display: none; flex-direction: row; min-height: 100vh; }

/* --- Sidebar --- */
.sidebar {
  width: 220px; flex-shrink: 0; background: var(--sb);
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
}
.sb-brand {
  padding: 18px 16px 14px;
  border-bottom: 1px solid var(--sb-border);
  display: flex; align-items: center; gap: 8px;
}
.sb-brand-ico {
  width: 30px; height: 30px; border-radius: 7px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dk));
  display: grid; place-items: center; flex-shrink: 0;
}
.sb-brand-ico svg { color: #fff; width: 14px; height: 14px; }
.sb-brand-name { font-family: var(--serif); font-size: 16px; color: #fff; }
.sb-brand-name span { color: #60B3E4; font-style: italic; }

.sb-doctor {
  padding: 13px 16px 13px;
  border-bottom: 1px solid var(--sb-border);
}
.doc-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
}

.doc-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.doc-name { font-size: 13px; font-weight: 600; color: #fff; line-height: 1.3; }
.doc-role { font-size: 11px; color: rgba(255,255,255,.4); }

.sb-nav { padding: 10px 8px; flex: 1; }
.nav-item {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 10px; border-radius: 7px;
  color: var(--sb-text); font-size: 13px; font-weight: 500;
  cursor: pointer; margin-bottom: 2px;
  transition: background var(--t), color var(--t);
}
.nav-item svg { width: 14px; height: 14px; flex-shrink: 0; }
.nav-item:hover, .nav-item.active { background: var(--sb-active); color: #fff; }
.nav-item.active { color: #60B3E4; }

.sb-footer {
  padding: 10px 8px; border-top: 1px solid var(--sb-border);
}
.btn-logout {
  width: 100%; display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border: none; border-radius: 6px;
  background: rgba(220,38,38,.15); color: #FCA5A5;
  font-family: var(--font); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: background var(--t);
}
.btn-logout:hover { background: rgba(220,38,38,.28); }
.btn-logout svg { width: 14px; height: 14px; }

/* --- Main content --- */
.app-main {
  flex: 1; overflow-y: auto; padding: 26px 24px;
  display: flex; flex-direction: column; gap: 18px;
}
.pg-head {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
}
.pg-title { font-family: var(--serif); font-size: 22px; font-weight: 600; }
.pg-sub   { font-size: 13px; color: var(--ink-soft); margin-top: 2px; }

/* ============================================================
   PATIENT LIST (left column)
============================================================ */
.search-bar {
  display: flex; gap: 8px; margin-bottom: 12px;
}
.search-bar input {
  flex: 1; padding: 8px 12px;
  border: 1.5px solid var(--border); border-radius: var(--rsm);
  background: var(--surface2); outline: none;
  transition: border-color var(--t), box-shadow var(--t);
}
.search-bar input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(29,111,164,.11);
  background: var(--surface);
}

.pt-table { width: 100%; border-collapse: collapse; }
.pt-table thead tr { background: var(--surface2); border-bottom: 2px solid var(--border); }
.pt-table th {
  padding: 8px 13px; text-align: left;
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .5px; color: var(--ink-ghost);
}
.pt-table td { padding: 11px 13px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
.pt-table tbody tr { cursor: pointer; transition: background var(--t); }
.pt-table tbody tr:hover { background: var(--primary-lt); }
.pt-table tbody tr.selected { background: var(--primary-lt); }
.pt-name { font-weight: 600; color: var(--ink); }
.pt-meta { font-size: 11px; color: var(--ink-soft); margin-top: 1px; }
.pt-table th.col-gender, .pt-table td.col-gender {
  width: 74px;
  min-width: 74px;
  text-align: center;
  padding-left: 8px;
  padding-right: 8px;
}
.gender-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  min-width: 48px;
  height: 24px;
  padding: 0 9px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  line-height: 1;
  white-space: nowrap;
}
.gender-male { background: #EAF3FF; color: #1D6FA4; }
.gender-female { background: #FFF0F6; color: #BE185D; }

.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  box-shadow: var(--shadow-sm);
  padding: 15px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.stat-icon {
  width: 38px;
  height: 38px;
  border-radius: 9px;
  display: grid;
  place-items: center;
  background: var(--primary-lt);
  color: var(--primary);
  flex-shrink: 0;
}
.stat-icon.green { background: var(--green-lt); color: var(--green); }
.stat-icon.amber { background: var(--amber-lt); color: var(--amber); }
.stat-icon.gray { background: #EEF2F7; color: var(--ink-mid); }
.stat-val { font-size: 22px; font-weight: 700; line-height: 1.1; }
.stat-label { font-size: 11px; color: var(--ink-soft); margin-top: 2px; }

.empty-state {
  text-align: center; padding: 36px 16px;
  color: var(--ink-soft); font-size: 13px;
}
.empty-state svg { display: block; margin: 0 auto 10px; opacity: .3; width: 36px; height: 36px; }

/* ============================================================
   TWO-COLUMN LAYOUT
============================================================ */
.layout-2col { display: grid; grid-template-columns: 380px 1fr; gap: 18px; align-items: start; }

/* Placeholder panel */
.placeholder-panel {
  border: 2px dashed var(--border); border-radius: var(--r);
  background: transparent; text-align: center;
  padding: 48px 20px; color: var(--ink-soft); font-size: 13px;
}
.placeholder-panel svg { display: block; margin: 0 auto 10px; opacity: .25; width: 40px; height: 40px; }

/* ============================================================
   PATIENT DETAIL (right column)
============================================================ */
.demo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.demo-item {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--rsm); padding: 10px 13px;
}
.demo-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: var(--ink-ghost); margin-bottom: 2px; }
.demo-val   { font-weight: 600; font-size: 14px; }
.demo-item.full { grid-column: 1 / -1; }

/* Patient name header */
.pt-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 12px; margin-bottom: 14px;
}
.pt-header-name { font-family: var(--serif); font-size: 20px; font-weight: 600; line-height: 1.2; }

/* Encounter history card */
.enc-item {
  border: 1px solid var(--border); border-radius: var(--rsm);
  margin-bottom: 10px; overflow: hidden; transition: box-shadow var(--t);
}
.enc-item:hover { box-shadow: var(--shadow); }
.enc-item-head {
  padding: 9px 14px;
  background: var(--surface2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
}
.enc-id   { font-size: 11px; font-weight: 700; color: var(--ink-mid); }
.enc-date { font-size: 11px; color: var(--ink-ghost); margin-left: auto; }
.enc-item-body { padding: 12px 14px; font-size: 13px; }
.enc-row  { margin-bottom: 8px; }
.enc-tag  { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: var(--ink-ghost); margin-bottom: 2px; }
.enc-val  { color: var(--ink); line-height: 1.5; }
.soap-view { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
.soap-view-row { display: flex; gap: 8px; align-items: flex-start; }
.soap-view-key {
  flex-shrink: 0; width: 100px;
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .4px; color: var(--ink-soft); padding-top: 1px;
}
.soap-view-val { font-size: 13px; color: var(--ink); line-height: 1.5; }
.soap-view-val.empty { color: var(--ink-ghost); font-style: italic; font-size: 12px; }
.enc-actions {
  padding: 10px 14px; background: var(--surface2); border-top: 1px solid var(--border);
  display: flex; gap: 7px; flex-wrap: wrap;
}



/* ============================================================
   VISUAL POLISH — Compact Clinical Workspace
============================================================ */
body {
  background:
    radial-gradient(circle at 0% 0%, rgba(29,111,164,.07), transparent 34%),
    linear-gradient(180deg, #F8FAFC 0%, #EEF3F8 100%);
}
.app-main {
  padding: 24px 26px;
  gap: 16px;
}
.pg-head {
  background: transparent;
  border: none;
  border-radius: 0;
  padding: 0 2px 2px;

<script>
/* ===================================================================

   ██║  ██║██╔══██╗   Arsitektur: Dokter → UI → Controller → Service → DB
   ██████╔╝██████╔╝
   ╚═════╝ ╚═════╝
=================================================================== */

/* ===================================================================
   DATABASE DUMMY LAYER
   Simulasi penyimpanan data in-memory (pengganti database nyata)
=================================================================== */
const DB = {

  encounters: [

             O:'TD 110/70, Nadi 76, Pemeriksaan neurologis dalam batas normal.',
             A:'Tension-type headache, tidak ada tanda bahaya.',
             P:'Ibuprofen 400mg prn, edukasi sleep hygiene dan manajemen stres.' },
      timestamp: new Date(Date.now() - 86400000*1),
    },
  ],
};

/* ===================================================================
   APPLICATION STATE
=================================================================== */
const State = {
  doctor:         null,   // dokter yang sedang login
  currentPatient: null,   // pasien yang sedang dipilih
  searchQuery:    '',     // query pencarian
};

/* ===================================================================
   SERVICE LAYER
   Logika bisnis murni — tidak menyentuh DOM secara langsung
=================================================================== */
const Service = {

  /** Otentikasi dokter; return objek dokter atau null */
  authenticateDoctor(username, password) {
    return DB.doctors.find(
      d => d.username === username.trim() && d.password === password
    ) || null;
  },

  /** Cari pasien berdasarkan ID atau nama (case-insensitive substring) */
  searchPatients(query) {
    const q = query.trim().toLowerCase();
    if (!q) return [...DB.patients];
    return DB.patients.filter(p =>
      p.id.toLowerCase().includes(q) || p.name.toLowerCase().includes(q)
    );
  },

  /** Ambil satu pasien berdasarkan ID */
  getPatientById(id) {
    return DB.patients.find(p => p.id === id) || null;
  },

  /** Ambil semua encounters milik satu pasien, terbaru di atas */
  getEncountersByPatient(patientId) {
    return DB.encounters
      .filter(e => e.patientId === patientId)
      .slice()
      .sort((a, b) => b.timestamp - a.timestamp);
  },

  /** Ambil satu encounter by ID */
  getEncounterById(encId) {
    return DB.encounters.find(e => e.id === encId) || null;
  },

  /**
   * validatePatientData — validasi form tambah pasien baru
   * @returns {string[]} array pesan error, kosong = valid
   */
  validatePatientData({ id, name, age, gender, address, diagnosa, soap }) {
    const errs = [];
    if (!id.trim())   errs.push('ID Pasien wajib diisi.');
    else if (DB.patients.find(p => p.id.toUpperCase() === id.trim().toUpperCase()))
      errs.push('ID Pasien sudah digunakan.');
    if (!name.trim()) errs.push('Nama pasien wajib diisi.');
    if (!age || isNaN(+age) || +age <= 0) errs.push('Umur harus diisi dengan angka valid.');
    if (!gender)      errs.push('Jenis kelamin wajib dipilih.');
    if (!address.trim()) errs.push('Alamat wajib diisi.');
    // Validasi SOAP awal
    const soapErrs = Service.validateSoapData({ diagnosa, soap });
    errs.push(...soapErrs);
    return errs;
  },

  /**
   * validateSoapData — validasi data pemeriksaan (edit/tambah encounter)
   * @returns {string[]} array pesan error
   */
  validateSoapData({ diagnosa, soap }) {
    const errs = [];
    if (!diagnosa.trim()) errs.push('Diagnosa / Problem List tidak boleh kosong.');
    const hasSOAP = soap.S.trim() || soap.O.trim() || soap.A.trim() || soap.P.trim();
    if (!hasSOAP) errs.push('Minimal satu kolom SOAP (S/O/A/P) harus terisi.');
    return errs;
  },

  /**
   * Buat pasien baru + encounter pertama sekaligus
   */
  createPatientWithSoap({ id, name, age, gender, address, keluhan, diagnosa, soap }, doctorName) {
    const patient = {
      id: id.trim().toUpperCase(), name: name.trim(),
      age: +age, gender, address: address.trim(),
    };
    DB.patients.push(patient);

    const enc = {
      id:         'ENC' + String(DB.encounters.length + 1).padStart(4, '0'),
      patientId:  patient.id,
      doctorName,
      keluhan:    keluhan.trim(),
      diagnosa:   diagnosa.trim(),
      soap:       { S: soap.S.trim(), O: soap.O.trim(), A: soap.A.trim(), P: soap.P.trim() },
      timestamp:  new Date(),
    };
    DB.encounters.push(enc);
    return { patient, enc };
  },

  /**
   * Update encounter yang sudah ada (edit)
   */
  updateEncounter(encId, { keluhan, diagnosa, soap }, doctorName) {
    const enc = DB.encounters.find(e => e.id === encId);
    if (!enc) return null;
    enc.keluhan    = keluhan.trim();
    enc.diagnosa   = diagnosa.trim();
    enc.soap       = { S: soap.S.trim(), O: soap.O.trim(), A: soap.A.trim(), P: soap.P.trim() };
    enc.doctorName = doctorName;
    enc.updatedAt  = new Date();
    return enc;
  },

  /**
   * Tambah encounter baru ke pasien yang sudah ada
   */
  addNewEncounter(patientId, { keluhan, diagnosa, soap }, doctorName) {
    const enc = {
      id:        'ENC' + String(DB.encounters.length + 1).padStart(4, '0'),
      patientId,
      doctorName,
      keluhan:   keluhan.trim(),
      diagnosa:  diagnosa.trim(),
      soap:      { S: soap.S.trim(), O: soap.O.trim(), A: soap.A.trim(), P: soap.P.trim() },
      timestamp: new Date(),
    };
    DB.encounters.push(enc);
    return enc;
  },
};

/* ===================================================================
   CONTROLLER LAYER
   Menghubungkan interaksi UI → Service → render
=================================================================== */

/* ------------------------------------------------------------------
   login()
   Alur: Dokter isi form → klik Masuk → login()
         → Service.authenticateDoctor() → renderDashboard()
------------------------------------------------------------------ */
function login() {
  const username = document.getElementById('inp-usr').value;
  const password = document.getElementById('inp-pwd').value;
  const errEl    = document.getElementById('l-err');
  errEl.style.display = 'none';

  const doctor = Service.authenticateDoctor(username, password);
  if (!doctor) {
    errEl.textContent   = '⚠ Username atau password salah.';
    errEl.style.display = 'block';
    return;
  }

  State.doctor = doctor;
  document.getElementById('page-login').style.display = 'none';
  document.getElementById('page-app').style.display   = 'flex';
 document.getElementById('sb-av').innerHTML =
  '<img src="' + doctor.photo + '" alt="' + doctor.name + '">';
  document.getElementById('sb-name').textContent = doctor.name;

  renderDashboard();
}

function logout() {
  State.doctor = null; State.currentPatient = null; State.searchQuery = '';
  document.getElementById('page-app').style.display   = 'none';
  document.getElementById('page-login').style.display = 'flex';
  document.getElementById('inp-usr').value = '';
  document.getElementById('inp-pwd').value = '';
  document.getElementById('l-err').style.display = 'none';
}

            Semua Pasien
          </div>

            <button class="btn btn-sm btn-add-compact" onclick="showAddPatientForm()">+ Pasien</button>
          </div>
        </div>
        <div class="card-body" style="padding-bottom:8px;">
          <div class="search-bar">
            <input type="text" id="s-inp" placeholder="Cari ID atau nama pasien…"
              oninput="searchPatient(this.value)" value="${esc(State.searchQuery)}">
          </div>
          <div id="pt-list"></div>

      </div>

      <!-- Kolom kanan: detail pasien (placeholder awal) -->
      <div id="right-col">

            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
          <div class="placeholder-title">Belum ada pasien dipilih</div>
          <div class="placeholder-sub">Pilih pasien dari daftar untuk melihat demographics, problem list, dan riwayat catatan SOAP.</div>

        </div>
      </div>
    </div>
  `;

  renderPatientList(State.searchQuery);

  // Jika ada pasien yang sudah dipilih (misal setelah modal ditutup), re-render
  if (State.currentPatient) {
    renderPatientDetail(State.currentPatient.id);

/* ------------------------------------------------------------------
   renderPatientList(query)
   Render tabel daftar pasien ke #pt-list.
   Alur: oninput → searchPatient() → renderPatientList()
------------------------------------------------------------------ */
function getInitials(name) {
  return name
    .split(' ')
    .filter(Boolean)
    .slice(0, 2)
    .map(part => part[0].toUpperCase())
    .join('');
}

function renderPatientList(query = '') {
  const patients = Service.searchPatients(query);
  const wrap     = document.getElementById('pt-list');
  const cntEl    = document.getElementById('pt-count');
  if (!wrap) return;

  cntEl.textContent = `${patients.length} pasien`;

  if (patients.length === 0) {
    wrap.innerHTML = `<div class="empty-state">
      <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      Tidak ditemukan pasien yang cocok.
    </div>`;
    return;
  }

  wrap.innerHTML = `
    <table class="pt-table">
      <thead><tr><th>ID</th><th>Nama Pasien</th><th class="col-gender">Gender</th></tr></thead>
      <tbody>
        ${patients.map(p => `
          <tr onclick="selectPatient('${p.id}')" class="${State.currentPatient?.id === p.id ? 'selected' : ''}">
            <td><span class="badge b-blue">${esc(p.id)}</span></td>
            <td>
              <div class="patient-name-wrap">
                <div class="patient-avatar">${getInitials(p.name)}</div>
                <div>
                  <div class="pt-name">${esc(p.name)}</div>
                  <div class="pt-meta">${p.age} thn · ${esc(p.address.substring(0, 30))}…</div>
                </div>
              </div>
            </td>
            <td class="col-gender">
              <span class="gender-badge ${p.gender === 'Laki-laki' ? 'gender-male' : 'gender-female'}">
                ${p.gender === 'Laki-laki' ? '♂ L' : '♀ P'}
              </span>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

/* ------------------------------------------------------------------

function renderPatientHistory(patientId) {
  const encounters = Service.getEncountersByPatient(patientId);
  const wrap       = document.getElementById('history-wrap');
  const cntEl      = document.getElementById('enc-count');
  if (!wrap) return;

  if (cntEl) cntEl.textContent = `${encounters.length} catatan`;

  if (encounters.length === 0) {
    wrap.innerHTML = `<div class="empty-state">
      <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>

      </svg>

        <button class="btn btn-green btn-sm" onclick="showAddSoapForm()" style="margin-top:8px;">
          Tambah Catatan Pertama
        </button>
      </span>
    </div>`;
    return;
  }

  wrap.innerHTML = encounters.map((enc, idx) => {
    const dt = enc.timestamp.toLocaleDateString('id-ID', { day:'2-digit', month:'long', year:'numeric' });
    const tm = enc.timestamp.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });
    const isLatest = idx === 0;

    return `
      <div class="enc-item anim-slide" style="animation-delay:${idx * .04}s">
        <div class="enc-item-head">
          <span class="enc-id">${enc.id}</span>

        </div>
        <div class="enc-item-body">
          <div class="enc-row">

            <div class="enc-val">${esc(enc.keluhan) || '<em class="text-muted">—</em>'}</div>
          </div>
          <div class="enc-row">
            <div class="enc-tag">Diagnosa / Problem List</div>
            <div class="enc-val">${esc(enc.diagnosa)}</div>
          </div>
          <div class="soap-view">
            ${renderSoapRow('S', 'Subjective',  enc.soap.S)}
            ${renderSoapRow('O', 'Objective',   enc.soap.O)}

            </svg>
            Edit Catatan
          </button>
        </div>
      </div>`;
  }).join('');
}

  const colorMap = { S:'sp-s', O:'sp-o', A:'sp-a', P:'sp-p' };
  return `

      </div>
      <div class="soap-view-val ${!value ? 'empty' : ''}">
        ${value ? esc(value) : 'Tidak diisi'}
      </div>
    </div>`;
}

         → validatePatientData() → Service.createPatientWithSoap()

------------------------------------------------------------------ */
function addPatientWithInitialSoap() {
  const data = collectPatientForm();
  clearModalErrors(['id','name','age','gender','addr','diag','soap']);

  // Validasi via Service
  const errs = Service.validatePatientData(data);

  if (errs.length > 0) {
    showModalErrors(errs, data);
    return;
  }

  // Simpan via Service
  const { patient } = Service.createPatientWithSoap(data, State.doctor.name);
  closeModal();
  showToast(`✓ Pasien ${patient.name} berhasil ditambahkan.`, 'ok');
  updateDashboardStats();
  renderPatientList(State.searchQuery);
  selectPatient(patient.id);
}

/** Kumpulkan data dari form tambah pasien */
function collectPatientForm() {
  return {
    id:      val('f-id'),
    name:    val('f-name'),
    age:     val('f-age'),
    gender:  val('f-gender'),
    address: val('f-addr'),
    keluhan: val('f-kel'),
    diagnosa:val('f-diag'),
    soap:    { S: val('f-s'), O: val('f-o'), A: val('f-a'), P: val('f-p') },
  };
}

/** Tampilkan error di modal tambah pasien */
function showModalErrors(errs, data) {
  // Field-level
  setFErr('f-id',   'fe-id',   !data.id.trim(), 'ID Pasien wajib diisi.');
  setFErr('f-name', 'fe-name', !data.name.trim(), 'Nama wajib diisi.');
  setFErr('f-age',  'fe-age',  !data.age || isNaN(+data.age) || +data.age <= 0, 'Umur tidak valid.');
  setFErr('f-addr', 'fe-addr', !data.address.trim(), 'Alamat wajib diisi.');
  setFErr('f-diag', 'fe-diag', !data.diagnosa.trim(), 'Diagnosa tidak boleh kosong.');

  const noSOAP = !Object.values(data.soap).some(v => v.trim());
  const soapEl = document.getElementById('fe-soap');
  if (soapEl) soapEl.textContent = noSOAP ? 'Minimal satu field SOAP harus terisi.' : '';

  // Summary
  const vb = document.getElementById('vb-add');
  if (vb) {
    vb.style.display = 'block';
    vb.innerHTML = '<strong>Mohon perbaiki:</strong><ul>' +
      errs.map(e => `<li>${e}</li>`).join('') + '</ul>';
    vb.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }
}

/** Tampilkan error di modal SOAP (edit/tambah baru) */
function showSoapErrors(errs, diagErrId, soapErrId, boxId) {
  const noSOAP  = errs.some(e => e.includes('SOAP'));
  const noDiag  = errs.some(e => e.includes('Diagnosa'));

  const diagEl = document.getElementById(diagErrId);
  const soapEl = document.getElementById(soapErrId);
  if (diagEl) diagEl.textContent = noDiag ? 'Diagnosa tidak boleh kosong.' : '';
  if (soapEl) soapEl.textContent = noSOAP ? 'Minimal satu field SOAP harus terisi.' : '';

  const vb = document.getElementById(boxId);
  if (vb) {
    vb.style.display = 'block';
    vb.innerHTML = '<strong>Mohon perbaiki:</strong><ul>' +
      errs.map(e => `<li>${e}</li>`).join('') + '</ul>';
    vb.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }
}

function clearModalErrors(fields) {
  fields.forEach(f => {
    const msgEl = document.getElementById('fe-' + f) || document.getElementById('ee-' + f) || document.getElementById('ne-' + f);
    if (msgEl) msgEl.textContent = '';
    const inpEl = document.getElementById('f-' + f) || document.getElementById('e-' + f) || document.getElementById('n-' + f);
    if (inpEl) inpEl.closest('.field')?.classList.remove('f-err');
  });
  const vb = document.querySelector('.val-box');
  if (vb) vb.style.display = 'none';
}

function clearFieldErr(ids) {
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = '';
  });
  const vb = document.querySelector('.val-box');
  if (vb) vb.style.display = 'none';
}

function setFErr(inputId, msgId, hasErr, msg) {
  const inp = document.getElementById(inputId);
  const m   = document.getElementById(msgId);
  if (inp) inp.closest('.field')?.classList.toggle('f-err', hasErr);
  if (m)   m.textContent = hasErr ? msg : '';
}

/** Render satu field SOAP dalam form */
function soapField(id, label, key, placeholder, value = '') {
  const colorMap = { S:'#1D4ED8', O:'#92400E', A:'var(--red)', P:'var(--green-dk)' };
  return `
    <div class="field">
      <label style="color:${colorMap[key]};"><strong>${key}</strong> — ${label}</label>
      <textarea id="${id}" placeholder="${placeholder}" rows="3">${esc(value)}</textarea>
    </div>`;
}

/* ===================================================================
   MODAL ENGINE
=================================================================== */
function openModal(title, bodyHTML) {
  const bg = document.getElementById('modal-bg');
  bg.innerHTML = `
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title">${title}</div>
        <button class="btn-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">${bodyHTML}</div>
    </div>`;
  bg.classList.remove('hidden');
  // Tutup jika klik overlay
  bg.onclick = e => { if (e.target === bg) closeModal(); };
}

function closeModal() {
  document.getElementById('modal-bg').classList.add('hidden');
}

/* ===================================================================
   MICRO-UTILITIES
=================================================================== */

let _tt;
function showToast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = `show t-${type}`;
  clearTimeout(_tt);
  _tt = setTimeout(() => { t.className = ''; }, 3600);
}

/** Ambil value elemen by ID */
function val(id) {
  const el = document.getElementById(id);
  return el ? el.value : '';
}

/** Cek apakah tanggal ada pada hari ini */
function isToday(date) {
  const d = new Date(date);
  const now = new Date();
  return d.getFullYear() === now.getFullYear()
    && d.getMonth() === now.getMonth()
    && d.getDate() === now.getDate();
}

/** Escape HTML untuk mencegah XSS */
function esc(s = '') {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
